name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd web
          npm ci

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Prepare embed directory
        run: |
          rm -rf internal/embed/dist
          mkdir -p internal/embed/dist
          cp -r web/dist/* internal/embed/dist/

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: internal/embed/dist
          retention-days: 1

  build-backend:
    name: Build Backend
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: internal/embed/dist

      - name: Download Go dependencies
        run: |
          go mod download
          go mod tidy

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=go-gin-api-admin
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          
          go build -ldflags="-X main.Version=${{ steps.get_version.outputs.VERSION }} -s -w" \
            -tags embed \
            -o build/${BINARY_NAME} \
            cmd/server/main.go

      - name: Create archive
        run: |
          ARCHIVE_NAME=go-gin-api-admin-${{ matrix.goos }}-${{ matrix.goarch }}
          
          # 创建打包目录
          mkdir -p package
          
          # 复制二进制文件
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp build/go-gin-api-admin.exe package/
          else
            cp build/go-gin-api-admin package/
          fi
          
          # 复制配置文件和文档
          cp config.yaml.example package/config.yaml.example
          cp README.md package/
          
          # 创建压缩包
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd package && zip -r ../${ARCHIVE_NAME}.zip *
          else
            cd package && tar -czf ../${ARCHIVE_NAME}.tar.gz *
          fi
          
          # 清理
          rm -rf package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            go-gin-api-admin-${{ matrix.goos }}-${{ matrix.goarch }}.*
          retention-days: 1

  release:
    name: Create Release
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Release ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            
            根据您的操作系统选择对应的版本：
            
            - **Linux amd64**: `go-gin-api-admin-linux-amd64.tar.gz`
            - **Linux arm64**: `go-gin-api-admin-linux-arm64.tar.gz`
            - **macOS amd64**: `go-gin-api-admin-darwin-amd64.tar.gz`
            - **macOS arm64 (Apple Silicon)**: `go-gin-api-admin-darwin-arm64.tar.gz`
            - **Windows amd64**: `go-gin-api-admin-windows-amd64.zip`
            
            压缩包内已包含：
            - 可执行文件
            - 配置文件示例 (`config.yaml.example`)
            - 说明文档 (`README.md`)
            
            ### 使用方法
            
            1. 下载对应平台的压缩包
            2. 解压缩
            3. 复制 `config.yaml.example` 为 `config.yaml` 并修改配置
            4. 运行程序：`./go-gin-api-admin -config config.yaml`
            
            ### 更新日志
            
            请查看 [commits](https://github.com/${{ github.repository }}/commits/${{ steps.get_version.outputs.VERSION }}) 了解详细变更。
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup artifacts
        run: rm -rf artifacts release-assets
