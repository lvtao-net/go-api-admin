<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商城首页</title>
    <link rel="stylesheet" href="/shop/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🛒 我的商城</div>
        <div class="nav-links">
            <a href="/shop" class="active">首页</a>
            <a href="/shop/orders.html">我的订单</a>
            <a href="/shop/wallet.html">我的钱包</a>
            <a href="/shop/profile.html">个人中心</a>
        </div>
        <div class="nav-user" id="navUser">
            <span id="userName">未登录</span>
            <a href="/shop/login.html" id="loginBtn">登录</a>
            <a href="javascript:void(0)" id="logoutBtn" style="display:none" onclick="logout()">退出</a>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>商品列表</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索商品..." onkeyup="searchProducts()">
                <button onclick="searchProducts()">搜索</button>
            </div>
        </div>

        <div class="categories">
            <button class="category-btn active" onclick="filterByCategory('')">全部</button>
            <div id="categoryList"></div>
        </div>

        <div class="products-grid" id="productsList">
            <div class="loading">加载中...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 我的商城 - 版权所有</p>
    </footer>

    <script src="/shop/js/api.js"></script>
    <script src="/shop/js/utils.js"></script>
    <script src="/shop/js/auth.js"></script>
    <script src="/shop/js/shop.js"></script>
    <script>
        checkAuth();
        loadCategories();
        loadProducts();
    </script>
</body>
</html>
